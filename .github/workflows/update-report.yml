name: Update public investment report

on:
  workflow_dispatch:
  schedule:
    # GitHub cron uses UTC: Sun-Fri 22:45 UTC = Mon-Sat 06:45 Taipei.
    # Mon-Fri refresh before Taiwan open; Sat captures Friday US close.
    - cron: "45 22 * * 0-5"
    # Taiwan market midday refresh, Monday-Friday, 11:30 Taipei time.
    - cron: "30 3 * * 1-5"
    # After Taiwan market close, Monday-Friday, 15:15 Taipei time.
    - cron: "15 7 * * 1-5"

permissions:
  contents: write

concurrency:
  group: update-public-investment-report
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Taipei

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Generate report
        run: python generate.py

      - name: Commit updated report
        run: |
          if [ -z "$(git status --porcelain index.html)" ]; then
            echo "No report changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Update public investment report"
          git push
